name: genai
description: "AR Rocket Explorer — place a 3-D rocket on any flat surface and learn about each part."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  ar_flutter_plugin_2:
    path: plugins/ar_flutter_plugin_2
  audioplayers: ^6.1.0
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.5
  http: ^1.2.2
  permission_handler: ^11.3.1
  vector_math: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/dot.gltf
    - assets/models/cloud.gltf
    - assets/models/flame_sprite.gltf
    - assets/models/flame_sprite.png
    - assets/models/flame_cone.gltf
    - assets/models/flame_inner.gltf
    - assets/models/smoke_plume.gltf
    - assets/models/flashcards/
    - assets/models/saturn_v_-_nasa/
    - assets/models/saturn_v_-_nasa/textures/
    - assets/audio/
